# Phase 7: Auto-publish
# After a PR is merged to main, this workflow:
# 1. Scans all submissions/*/plugin.yaml
# 2. Generates registry.json entries for each
# 3. Pushes updated registry.json to the plugin-store repo
# 4. Creates a git tag for the plugin version

name: "Phase 7: Publish"

on:
  push:
    branches: [main]
    paths:
      - 'submissions/**'

permissions:
  contents: write

jobs:
  publish:
    name: Generate registry and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed plugins
        id: detect
        run: |
          # Find which plugins were changed in the last merge commit
          CHANGED=$(git diff --name-only HEAD~1...HEAD -- 'submissions/' || true)
          if [ -z "$CHANGED" ]; then
            echo "No plugin changes detected"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PLUGINS=$(echo "$CHANGED" | cut -d'/' -f2 | sort -u)
          echo "changed_plugins=${PLUGINS}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed plugins: ${PLUGINS}"

      - name: Install yq
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Generate registry entries from submissions
        if: steps.detect.outputs.has_changes == 'true'
        id: generate
        run: |
          # Build a JSON array of community plugin entries from all submissions
          ENTRIES="[]"

          for PLUGIN_DIR in submissions/*/; do
            YAML_FILE="${PLUGIN_DIR}plugin.yaml"
            [ -f "$YAML_FILE" ] || continue

            NAME=$(yq '.name' "$YAML_FILE")
            # Skip example plugin
            [ "$NAME" = "_example-plugin" ] && continue

            VERSION=$(yq '.version' "$YAML_FILE")
            DESC=$(yq '.description' "$YAML_FILE")
            AUTHOR_NAME=$(yq '.author.name' "$YAML_FILE")
            AUTHOR_GITHUB=$(yq '.author.github' "$YAML_FILE")
            ALIAS=$(yq '.alias // ""' "$YAML_FILE")
            LICENSE=$(yq '.license' "$YAML_FILE")
            CATEGORY=$(yq '.category' "$YAML_FILE")
            TAGS=$(yq '.tags | @json' "$YAML_FILE")
            RISK_LEVEL=$(yq '.extra.risk_level // "low"' "$YAML_FILE")
            PROTOCOLS=$(yq '.extra.protocols // [] | @json' "$YAML_FILE")

            # Determine the skill component — community plugins store skills in this repo
            SKILL_DIR=$(yq '.components.skill.dir // ""' "$YAML_FILE")
            SKILL_REPO="yz06276/plugin-store-community"

            # Get the commit SHA of the current HEAD (pinned for security)
            COMMIT_SHA=$(git rev-parse HEAD)

            # Build the registry entry
            ENTRY=$(jq -n \
              --arg name "$NAME" \
              --arg alias "$ALIAS" \
              --arg version "$VERSION" \
              --arg desc "$DESC" \
              --arg author "$AUTHOR_NAME" \
              --arg category "$CATEGORY" \
              --argjson tags "$TAGS" \
              --arg repo "$SKILL_REPO" \
              --arg dir "$SKILL_DIR" \
              --arg commit "$COMMIT_SHA" \
              --argjson protocols "$PROTOCOLS" \
              --arg risk "$RISK_LEVEL" \
              --arg link "https://github.com/${SKILL_REPO}" \
              '{
                name: $name,
                alias: (if $alias == "" then null else $alias end),
                version: $version,
                description: $desc,
                author: { name: $author },
                category: $category,
                tags: $tags,
                type: "community-developer",
                components: {
                  skill: {
                    repo: $repo,
                    dir: $dir,
                    commit: $commit
                  }
                },
                extra: {
                  protocols: $protocols,
                  risk_level: $risk
                },
                link: $link
              }')

            ENTRIES=$(echo "$ENTRIES" | jq --argjson entry "$ENTRY" '. + [$entry]')
          done

          echo "$ENTRIES" > /tmp/community_entries.json
          echo "Generated $(echo "$ENTRIES" | jq length) community plugin entries"

      - name: Create git tags for changed plugins
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          for PLUGIN_NAME in ${{ steps.detect.outputs.changed_plugins }}; do
            YAML_FILE="submissions/${PLUGIN_NAME}/plugin.yaml"
            [ -f "$YAML_FILE" ] || continue
            [ "$PLUGIN_NAME" = "_example-plugin" ] && continue

            VERSION=$(yq '.version' "$YAML_FILE")
            TAG="plugins/${PLUGIN_NAME}@${VERSION}"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping"
            else
              git tag "$TAG"
              echo "Created tag: $TAG"
            fi
          done

          git push --tags || true

      - name: Upload community entries artifact
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: community-registry-entries
          path: /tmp/community_entries.json

      - name: Update registry in plugin-store repo
        if: steps.detect.outputs.has_changes == 'true'
        env:
          PLUGIN_STORE_TOKEN: ${{ secrets.PLUGIN_STORE_TOKEN }}
        run: |
          # Clone the plugin-store repo
          git clone --depth=1 "https://x-access-token:${PLUGIN_STORE_TOKEN}@github.com/yz06276/plugin-store.git" /tmp/plugin-store

          cd /tmp/plugin-store

          # Read current registry.json
          CURRENT=$(cat registry.json)

          # Get non-community plugins (okx-official, verified-third-party)
          OFFICIAL=$(echo "$CURRENT" | jq '[.plugins[] | select(.type != "community-developer" and .type != "community")]')

          # Get new community entries
          COMMUNITY=$(cat /tmp/community_entries.json)

          # Merge: official + community
          MERGED=$(jq -n \
            --argjson official "$OFFICIAL" \
            --argjson community "$COMMUNITY" \
            --arg stats_url "$(echo "$CURRENT" | jq -r '.stats_url // ""')" \
            '{
              schema_version: 1,
              stats_url: $stats_url,
              plugins: ($official + $community)
            }')

          echo "$MERGED" | jq '.' > registry.json

          # Commit and push
          git config user.name "plugin-store-bot"
          git config user.email "bot@plugin-store.local"
          git add registry.json
          git diff --staged --quiet && echo "No registry changes" && exit 0

          git commit -m "Update registry.json with community plugins

          Auto-generated from plugin-store-community submissions."
          git push
          echo "Registry updated successfully"
